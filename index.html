<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ-TRACK</title>
    <link rel="icon" href="logo.png" type="image/png" sizes="32x32">
    <link rel="icon" href="logo.png" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png" type="image/png">
    <meta name="msapplication-TitleImage" href="logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.101.1/dist/umd/supabase.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.all.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-secondary">
    <div class="container-fluid p-0">
        <!-- Header -->
        <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top px-3">
            <div class="container-fluid p-0">
                <a class="navbar-brand p-0 d-flex align-items-center gap-1" href="javascript:void(0)">
                    <img src="logo.png" alt="Logo" width="35" height="35">
                    <div style="line-height: 1;">
                        <h5 class="fw-bold text-primary mb-0" style="line-height: 1;">AZ<span
                                class="text-dark">TRACK</span></h5>
                        <small class="fw-semibold d-block" style="font-size: 0.55em; line-height: 1;">STRATEGY • GROWTH
                            • TRUST</small>
                    </div>
                </a>
                <div class="d-flex">
                    <div class="dropdown">
                        <a class="d-block rounded-circle border border-dark-subtle border-3" href="javascript:void(0)"
                            role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="Manldpi.png" alt="Logo" width="35" height="35">
                        </a>

                        <ul class="dropdown-menu dropdown-menu-end p-2">
                            <li>
                                <div class="text-center mb-2">
                                    <img src="Manldpi.png" class="rounded-circle border border-dark-subtle border-4"
                                        alt="Logo" width="95" height="95">
                                </div>
                            </li>
                            <li><input type="text" disabled
                                    class="form-control form-control-sm text-center border border-dark mb-2"
                                    id="usnInfo" value="@username"></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="btn btn-outline-primary btn-sm py-1 rounded-3 w-100 mb-1"
                                    href="javascript:void(0)" id="btResetPass">Reset Password</a></li>
                            <li><a class="btn btn-sm btn-outline-danger py-1 rounded-3 w-100" href="javascript:void(0)"
                                    id="btLogout">Logout</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Summary Cards -->
        <div class="container-fluid pt-5">
            <div class="row mt-5 mb-md-4 mb-3 gap-md-0 gap-2">
                <div class="col-md-4 col">
                    <div class="card bg-dark border border-light text-white shadow py-1 rounded">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h5 class="card-title mb-1">Total Pemasukan</h5>
                                    <h3 class="mb-0 fw-bold" id="totalIncome">Rp.0</h3>
                                </div>
                                <i class="fas text-success fa-arrow-up fa-3x opacity-75"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-dark border border-light text-white shadow py-1 rounded">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h5 class="card-title mb-1">Total Pengeluaran</h5>
                                    <h3 class="mb-0 fw-bold" id="totalExpense">Rp 0</h3>
                                </div>
                                <i class="fas text-danger fa-arrow-down fa-3x opacity-75"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card bg-dark border border-light text-white shadow py-1 rounded">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <div>
                                    <h5 class="card-title mb-1">Saldo</h5>
                                    <h3 class="mb-0 fw-bold" id="balance">Rp 0</h3>
                                </div>
                                <i class="fas text-primary fa-balance-scale fa-3x opacity-75"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input Form -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="card shadow rounded bg-dark border border-light">
                        <div class="card-header bg-white border-bottom border-light">
                            <h6 class="mb-0 text-secondary">
                                <i class="fas fa-plus-circle me-2"></i>
                                Tambah Transaksi
                            </h6>
                        </div>
                        <div class="card-body">
                            <form id="transactionForm">
                                <div class="row justify-content-between">
                                    <div class="col-md">
                                        <label class="form-label">Jenis</label>
                                        <select class="form-select" id="type" required>
                                            <option value="" selected>Pilih...</option>
                                            <option value="income">Pemasukan</option>
                                            <option value="expense">Pengeluaran</option>
                                        </select>
                                    </div>
                                    <div class="col-md">
                                        <label class="form-label">Kategori</label>
                                        <select class="form-select" id="category" required>
                                            <option value="" selected>Pilih...</option>
                                            <option value="Gaji">Gaji</option>
                                            <option value="Bonus">Bonus</option>
                                            <option value="Makan">Makan</option>
                                            <option value="Ngopi">Ngopi</option>
                                            <option value="Transport">Transport</option>
                                            <option value="Belanja">Belanja</option>
                                            <option value="Tagihan">Tagihan</option>
                                            <option value="Lainnya">Lainnya</option>
                                        </select>
                                    </div>
                                    <div class="col-md">
                                        <label class="form-label">Nominal (Rp)</label>
                                        <input type="number" class="form-control" id="amount" min="0" required>
                                    </div>
                                    <div class="col-md">
                                        <label class="form-label">Keterangan</label>
                                        <input type="text" class="form-control" id="description">
                                    </div>
                                    <div class="col-auto">
                                        <label class="form-label">&nbsp;</label>
                                        <div>
                                            <button type="submit" class="btn btn-success me-2">
                                                <i class="fas fa-save me-1"></i>Add
                                            </button>
                                            <button type="button" class="btn btn-secondary" id="clearForm">
                                                <i class="fas fa-times me-1"></i>Clear
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Transactions Table -->
            <div class="row">
                <div class="col-12">
                    <div class="card shadow rounded bg-dark border border-light">
                        <div class="card-header bg-white border-bottom border-light">
                            <h6 class="mb-0 text-secondary">
                                <i class="fas fa-list me-2"></i>
                                Daftar Transaksi
                                <span class="badge bg-warning ms-2 rounded-circle" id="totalTransactions">0</span>
                            </h6>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-dark table-hover table-bordered table-straped"
                                    id="transactionsTable">
                                    <thead>
                                        <tr>
                                            <th width="50">Aksi</th>
                                            <th>Tanggal</th>
                                            <th>Jenis</th>
                                            <th>Kategori</th>
                                            <th>Nominal</th>
                                            <th>Keterangan</th>
                                        </tr>
                                    </thead>
                                    <tbody id="transactionsBody">
                                        <tr>
                                            <td colspan="6" class="text-center py-4 text-light ">
                                                <i class="fas fa-inbox fa-2x mb-2 d-block"></i>
                                                Belum ada transaksi
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL AUTH -->
    <div class="modal fade" id="authModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="authModalTitle">Silahkan Login</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="authForm">
                        <input type="hidden" id="authMode" value="login">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <div class="mb-3" id="genderField" style="display:none">
                            <label class="form-label">Gender</label>
                            <select class="form-select" id="gender">
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="authSubmit">
                            <span id="authBtnText">Login</span>
                        </button>
                    </form>
                    <div class="text-center mt-3">
                        <span id="toggleAuth" class="text-primary cursor-pointer small">
                            Belum punya akun? <strong>Daftar</strong>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> -->
    <script src="script2.js"></script>
</body>

</html>
